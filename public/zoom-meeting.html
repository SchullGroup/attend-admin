<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Meeting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

    #meetingSDKElement {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #loading, #error {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }
    #loading { color: #9ca3af; gap: 14px; }
    #error   { display: none; color: #f87171; text-align: center; padding: 32px; font-size: 14px; }

    #loading-spinner {
      width: 32px; height: 32px; border: 3px solid #333;
      border-top-color: #0B5CFF; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="meetingSDKElement"></div>

  <div id="loading">
    <div id="loading-spinner"></div>
    <p style="font-size:13px">Loading Zoom…</p>
    <p id="coi-debug" style="font-size:11px;color:#666;font-family:monospace"></p>
  </div>
  <div id="error"></div>
  <script>
    // Diagnostic only: confirms whether this iframe is actually
    // cross-origin-isolated (required for SharedArrayBuffer, which
    // Ribbon/Gallery view depend on). Visible on screen and logged to
    // console so it can be checked without opening devtools on the
    // right frame.
    (function () {
      var isolated = typeof window.crossOriginIsolated !== 'undefined' ? window.crossOriginIsolated : 'unsupported';
      console.log('[ZoomEmbed] crossOriginIsolated =', isolated);
      var el = document.getElementById('coi-debug');
      if (el) el.textContent = 'crossOriginIsolated: ' + isolated;
      window.parent.postMessage({ type: 'ZOOM_DEBUG', crossOriginIsolated: isolated }, '*');
    })();
  </script>

  <script src="https://source.zoom.us/6.2.0/lib/vendor/react.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/react-dom.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/redux.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/redux-thunk.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/lodash.min.js"></script>
  <script src="https://source.zoom.us/zoom-meeting-embedded-6.2.0.min.js"></script>

  <script>
    var sdkClient = null;

    function extractError(e) {
      if (!e) return 'Unknown error';
      if (typeof e === 'string') return e;
      if (e.reason)       return e.reason + (e.errorCode ? ' (code ' + e.errorCode + ')' : '');
      if (e.errorMessage) return e.errorMessage + (e.errorCode ? ' (code ' + e.errorCode + ')' : '');
      if (typeof e.message === 'string' && e.message) return e.message;
      try { return JSON.stringify(e); } catch (_) { return 'Unknown error'; }
    }

    function showError(e) {
      var msg = extractError(e);
      document.getElementById('loading').style.display = 'none';
      var el = document.getElementById('error');
      el.style.display = 'flex';
      el.textContent = 'Error: ' + msg;
      window.parent.postMessage({ type: 'ZOOM_ERROR', message: msg }, '*');
    }

    window.addEventListener('message', async function (event) {
      var data = event.data;
      if (!data) return;

      if (data.type === 'ZOOM_JOIN') {
        try {
          var el = document.getElementById('meetingSDKElement');

          try { localStorage.clear(); } catch (_) {}
          try { sessionStorage.clear(); } catch (_) {}

          sdkClient = ZoomMtgEmbedded.createClient();

          await sdkClient.init({
            sdkKey:       data.sdkKey,
            zoomAppRoot:  el,
            language:     'en-US',
            patchJsMedia: true,
            customize: {
              video: {
                isResizable: true,
                viewSizes: {
                  default: { width: 340, height: 520 },
                  ribbon:  { width: 340, height: 120 },
                },
              },
            },
          });

          await sdkClient.join({
            sdkKey:        String(data.sdkKey        || ''),
            signature:     String(data.signature     || ''),
            meetingNumber: String(data.meetingNumber || ''),
            password:      String(data.password      || ''),
            userName:      String(data.userName      || 'Host'),
            ...(data.zak ? { zak: String(data.zak) } : {}),
          });

          document.getElementById('loading').style.display = 'none';
          window.parent.postMessage({ type: 'ZOOM_JOINED' }, '*');
        } catch (e) {
          showError(e);
        }
      }

      if (data.type === 'ZOOM_LEAVE') {
        (async () => {
          try { if (sdkClient) await sdkClient.leaveMeeting(); } catch (_) {}
          window.parent.postMessage({ type: 'ZOOM_LEFT' }, '*');
        })();
      }

      if (data.type === 'ZOOM_SEND_CHAT' && data.message && sdkClient) {
        // Forward a website Q&A question into the live Zoom meeting chat.
        try {
          if (typeof sdkClient.sendChatMessage === 'function') {
            // Zoom Embedded SDK ≥ 3.x: omit toUserId to send to everyone
            sdkClient.sendChatMessage({ message: String(data.message) });
          } else if (typeof sdkClient.getChatClient === 'function') {
            sdkClient.getChatClient().sendToAll(String(data.message));
          }
        } catch (e) {
          console.warn('[ZoomEmbed] Chat send failed:', e);
        }
      }
    });

    window.addEventListener('load', function () {
      window.parent.postMessage({ type: 'ZOOM_READY' }, '*');
    });
  </script>
</body>
</html>
