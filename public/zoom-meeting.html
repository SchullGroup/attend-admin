<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Meeting</title>
  <!-- ────────────────────────────────────────────────────────────────────
       This page hosts Zoom's CLIENT VIEW (ZoomMtg) — the full Zoom web
       client, the same UI you get joining from zoom.us in a browser:
       native bottom toolbar, Participants panel with waiting-room admit
       prompts, Settings, view switching. It replaced the Component View
       (ZoomMtgEmbedded) whose floating mini-window needed constant manual
       sizing (viewSizes/PAD math), defaulted to ribbon view, and had
       broken/cramped participants & settings popovers.

       Client view "takes over the page" by design — which is exactly why
       it lives in this dedicated iframe: it takes over THIS document only,
       and the parent (zoom-embed.tsx) shows it inline inside the Zoom
       Meeting card. The iframe also isolates the SDK's bundled React from
       the app's React (the original reason this page exists).

       COOP/COEP for SharedArrayBuffer (gallery view) is set server-side in
       src/proxy.ts, scoped to this path and /events/live — the parent page
       needs the headers too or crossOriginIsolated stays false in here.

       postMessage protocol with the parent (unchanged from component view):
         Parent → here : ZOOM_JOIN, ZOOM_LEAVE, ZOOM_SEND_CHAT (no-op now)
         here → Parent : ZOOM_READY, ZOOM_JOINED, ZOOM_ERROR, ZOOM_LEFT

       Leave flow: client view navigates to `leaveUrl` after leaving a
       meeting (whether via our ZOOM_LEAVE message or Zoom's own toolbar
       Leave button). leaveUrl is this same page with ?left=1, which just
       posts ZOOM_LEFT to the parent so it can reset to idle.
       ──────────────────────────────────────────────────────────────────── -->
  <script>
    // Unregister any leftover coi-serviceworker from the abandoned
    // client-side isolation attempt (see git history) so it doesn't keep
    // intercepting requests from this page.
    if (navigator.serviceWorker) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
  </script>
  <link type="text/css" rel="stylesheet" href="https://source.zoom.us/6.2.0/css/bootstrap.css" />
  <link type="text/css" rel="stylesheet" href="https://source.zoom.us/6.2.0/css/react-select.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

    #loading, #error {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }
    #loading { color: #9ca3af; gap: 14px; }
    #error   { display: none; color: #f87171; text-align: center; padding: 32px; font-size: 14px; }

    #loading-spinner {
      width: 32px; height: 32px; border: 3px solid #333;
      border-top-color: #0B5CFF; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-spinner"></div>
    <p style="font-size:13px">Loading Zoom…</p>
    <p id="coi-debug" style="font-size:11px;color:#666;font-family:monospace"></p>
  </div>
  <div id="error"></div>

  <script>
    // Post-leave landing: client view navigated here via leaveUrl.
    // Just tell the parent and render nothing — the parent tears the
    // iframe down (or resets to the idle "Launch" card).
    var IS_LEAVE_LANDING = new URLSearchParams(location.search).get('left') === '1';
    if (IS_LEAVE_LANDING) {
      document.getElementById('loading').style.display = 'none';
      window.parent.postMessage({ type: 'ZOOM_LEFT' }, '*');
    }

    // Diagnostic: confirms whether this iframe is cross-origin-isolated
    // (required for SharedArrayBuffer → gallery view). Shown on screen and
    // logged so it can be checked without picking the right devtools frame.
    (function () {
      var isolated = typeof window.crossOriginIsolated !== 'undefined' ? window.crossOriginIsolated : 'unsupported';
      console.log('[ZoomEmbed] crossOriginIsolated =', isolated);
      var el = document.getElementById('coi-debug');
      if (el) el.textContent = 'crossOriginIsolated: ' + isolated;
      window.parent.postMessage({ type: 'ZOOM_DEBUG', crossOriginIsolated: isolated }, '*');
    })();
  </script>

  <script>
    // Zoom's toolbar menus (More, reactions, etc.) move focus into the
    // menu when they open. The browser then scrolls EVERY ancestor
    // scroller — including the parent dashboard page hosting this iframe —
    // to reveal the newly focused element, which yanked the whole page to
    // the top on every "More" click. Defaulting programmatic focus() to
    // preventScroll stops that; must run before the SDK bundle loads.
    (function () {
      var origFocus = HTMLElement.prototype.focus;
      HTMLElement.prototype.focus = function (opts) {
        try {
          origFocus.call(this, Object.assign({ preventScroll: true }, opts || {}));
        } catch (_) {
          origFocus.call(this);
        }
      };
    })();
  </script>

  <script src="https://source.zoom.us/6.2.0/lib/vendor/react.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/react-dom.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/redux.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/redux-thunk.min.js"></script>
  <script src="https://source.zoom.us/6.2.0/lib/vendor/lodash.min.js"></script>
  <!-- CLIENT VIEW bundle (zoom-meeting-*), not the embedded/component one -->
  <script src="https://source.zoom.us/zoom-meeting-6.2.0.min.js"></script>

  <script>
    function extractError(e) {
      if (!e) return 'Unknown error';
      if (typeof e === 'string') return e;
      if (e.reason)       return e.reason + (e.errorCode ? ' (code ' + e.errorCode + ')' : '');
      if (e.errorMessage) return e.errorMessage + (e.errorCode ? ' (code ' + e.errorCode + ')' : '');
      if (typeof e.message === 'string' && e.message) return e.message;
      try { return JSON.stringify(e); } catch (_) { return 'Unknown error'; }
    }

    function showError(e) {
      var msg = extractError(e);
      document.getElementById('loading').style.display = 'none';
      var el = document.getElementById('error');
      el.style.display = 'flex';
      el.textContent = 'Error: ' + msg;
      window.parent.postMessage({ type: 'ZOOM_ERROR', message: msg }, '*');
    }

    if (!IS_LEAVE_LANDING) {
      ZoomMtg.setZoomJSLib('https://source.zoom.us/6.2.0/lib', '/av');
      ZoomMtg.preLoadWasm();
      ZoomMtg.prepareWebSDK();
    }

    var joined = false;

    window.addEventListener('message', function (event) {
      var data = event.data;
      if (!data || IS_LEAVE_LANDING) return;

      if (data.type === 'ZOOM_JOIN') {
        try {
          ZoomMtg.init({
            leaveUrl:       '/zoom-meeting.html?left=1',
            patchJsMedia:   true,
            // Skip the AV-preview screen: the parent keeps an opaque
            // "Connecting…" overlay over this iframe until ZOOM_JOINED,
            // so a preview screen would be invisible anyway. Mic/camera
            // are controlled from the native toolbar once in.
            disablePreview: true,
            success: function () {
              ZoomMtg.join({
                signature:     String(data.signature     || ''),
                meetingNumber: String(data.meetingNumber || ''),
                passWord:      String(data.password      || ''),
                userName:      String(data.userName      || 'Host'),
                ...(data.zak ? { zak: String(data.zak) } : {}),
                success: function () {
                  joined = true;
                  document.getElementById('loading').style.display = 'none';
                  window.parent.postMessage({ type: 'ZOOM_JOINED' }, '*');
                },
                error: showError,
              });
            },
            error: showError,
          });
        } catch (e) {
          showError(e);
        }
      }

      if (data.type === 'ZOOM_LEAVE') {
        // After leaveMeeting the SDK navigates this iframe to leaveUrl
        // (?left=1), which posts ZOOM_LEFT. If we never joined (still on
        // loading/error), confirm immediately so the parent doesn't wait.
        if (joined) {
          try { ZoomMtg.leaveMeeting({}); } catch (_) {
            window.parent.postMessage({ type: 'ZOOM_LEFT' }, '*');
          }
        } else {
          window.parent.postMessage({ type: 'ZOOM_LEFT' }, '*');
        }
      }

      if (data.type === 'ZOOM_SEND_CHAT') {
        // Component view had sendChatMessage(); client view has no
        // programmatic chat API. Q&A questions still reach the host via
        // the parent's floating toasts overlaid on this iframe.
        console.warn('[ZoomEmbed] ZOOM_SEND_CHAT ignored — client view has no chat-send API.');
      }
    });

    window.addEventListener('load', function () {
      if (!IS_LEAVE_LANDING) window.parent.postMessage({ type: 'ZOOM_READY' }, '*');
    });
  </script>
</body>
</html>
